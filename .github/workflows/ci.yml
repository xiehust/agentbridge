name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # aws-lc-sys (pulled in by the Feishu adapter's rustls chain) needs a C
      # toolchain + cmake to build from source.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # No fmt gate: rustfmt's default style drifts between toolchain versions,
      # so a strict --check goes red on a version mismatch even when the code is
      # clean locally. Correctness (clippy/build/test) is what gates CI.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --all
